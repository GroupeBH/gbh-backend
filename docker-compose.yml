# Docker Compose for development (local MongoDB and Redis)
services:
  mongo:
    profiles: ["localdb"]
    image: mongo:7
    container_name: gbh-mongo-dev
    restart: unless-stopped
    ports:
      - "27017:27017"
    volumes:
      - mongo_data:/data/db
    environment:
      - MONGO_INITDB_ROOT_USERNAME=admin
      - MONGO_INITDB_ROOT_PASSWORD=password
    healthcheck:
      test: ["CMD", "mongosh", "--quiet", "--eval", "db.adminCommand('ping').ok"]
      interval: 10s
      timeout: 5s
      retries: 10
    networks:
      - gbh-network

  redis:
    image: redis:7-alpine
    container_name: gbh-redis-dev
    restart: unless-stopped
    ports:
      - "6379:6379"
    command: ["redis-server", "--appendonly", "yes"]
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 3s
      retries: 10
    networks:
      - gbh-network

  api:
    build:
      context: .
      target: dev
    container_name: gbh-api-dev
    restart: unless-stopped
    volumes:
      - .:/app
      - /app/tmp
    env_file:
      - .env
    environment:
      - APP_ENV=development
      - SERVER_ADDR=:8080
      - MONGO_URI=${MONGO_URI_DOCKER:-mongodb://admin:password@mongo:27017/gbh?authSource=admin}
      - MONGO_DB=
      - FRONTEND_ORIGIN=http://localhost:3000
      - FRONTEND_ORIGINS=http://localhost:3000
      - RATE_LIMIT_APPOINTMENTS=10
      - RATE_LIMIT_CONTACT=5
      - RATE_LIMIT_WINDOW_SEC=60
      - TZ=Africa/Kinshasa
      - REDIS_URL=redis://redis:6379/0
      - REDIS_ADDR=redis:6379
      - REDIS_PASSWORD=
      - REDIS_DB=0
      - CACHE_TTL_SECONDS=60
      - ADMIN_API_KEY=dev-key
      - ADMIN_USER=admin
      - ADMIN_PASSWORD=dev-password
      - JWT_SECRET=dev-secret-key
      - ACCESS_TTL_MINUTES=15
      - REFRESH_TTL_MINUTES=43200
      - COOKIE_SECURE=false
    extra_hosts:
      - "host.docker.internal:host-gateway"
    ports:
      - "8080:8080"
    depends_on:
      redis:
        condition: service_healthy
    networks:
      - gbh-network

volumes:
  mongo_data:
  redis_data:

networks:
  gbh-network:
    driver: bridge

